name: Validate HACS

on:
  push:
    branches:
      - master
      - beta
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'

jobs:
  validate:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v4'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build:prod
      - name: HACS validation
        uses: 'hacs/action@main'
        with:
          category: 'plugin'
